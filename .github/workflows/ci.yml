name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt -e .

      - name: Run tests
        run: pytest --import-mode=importlib tests/

  build-and-check:
    name: Build, Health Check & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/mail-pipeline
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short

      - name: Build image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: prod
          load: true
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Tag image for health checks
        env:
          IMAGE_ID: ${{ steps.build.outputs.imageid }}
        run: docker tag "$IMAGE_ID" mail-pipeline:ci-local

      - name: Health check — mbsync
        run: docker run --rm --entrypoint mbsync mail-pipeline:ci-local --version

      - name: Health check — notmuch
        run: docker run --rm --entrypoint notmuch mail-pipeline:ci-local --version

      - name: Health check — flow imports
        run: docker run --rm --entrypoint python mail-pipeline:ci-local -c "from mail_pipeline.flow import mail_flow; print(mail_flow.name)"
